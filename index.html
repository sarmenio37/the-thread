<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Thread</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0eb; font-family: 'Inter', sans-serif; color: #2c2c2c; min-height: 100vh; }
    .header { background: #2c2c2c; color: #f5f0eb; text-align: center; padding: 72px 24px 64px; }
    .header .label { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.45; margin-bottom: 20px; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(48px, 10vw, 88px); font-weight: 400; line-height: 1.05; letter-spacing: -2px; }
    .header .sub { font-family: 'Playfair Display', serif; font-style: italic; font-size: 18px; opacity: 0.5; margin-top: 14px; }
    .header .names { margin-top: 32px; font-size: 13px; font-weight: 300; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }
    .container { max-width: 720px; margin: 0 auto; padding: 64px 24px 96px; }
    .section-label { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
    .section-label .line { flex: 1; height: 1px; background: #c4b9ad; }
    .section-label span { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #999; white-space: nowrap; }
    .issue-list { display: flex; flex-direction: column; gap: 2px; }
    .issue-item { background: #fff; border-radius: 3px; padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: inherit; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: box-shadow 0.15s; }
    .issue-item:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.09); }
    .issue-month { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
    .issue-year { font-size: 13px; color: #aaa; margin-top: 2px; }
    .issue-arrow { font-size: 18px; color: #ccc; }
    .empty { text-align: center; padding: 48px; color: #bbb; font-size: 15px; font-weight: 300; font-style: italic; }
    .footer { text-align: center; padding: 32px; font-size: 12px; color: #bbb; }
  </style>
</head>
<body>
  <div class="header">
    <div class="label">A letter between friends</div>
    <h1>The Thread</h1>
    <div class="sub">Monthly dispatches from three cities</div>
    <div class="names">Caroline &middot; Kyla &middot; Sarah</div>
  </div>
  <div class="container">
    <div class="section-label">
      <div class="line"></div>
      <span>All Issues</span>
      <div class="line"></div>
    </div>
    <div class="issue-list">
      <a class="issue-item" href="issues/april-2026.html">
        <div>
          <div class="issue-month">April 2026</div>
          <div class="issue-year">Issue No. 1</div>
        </div>
        <div class="issue-arrow">→</div>
      </a>
    </div>
  </div>
  <div class="footer">The Thread · A private letter between friends</div>
</body>
</html>
